<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResumePilot AI - AI智能求职助手</title>
<style>
  /* ============ RESET & BASE ============ */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  @media (max-height: 650px) {
    body { overflow-y: auto; }
  }
  body {
    background: #0a0a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #e2e8f0;
  }

  /* ============ 1. AURORA BACKGROUND ============ */
  .aurora-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    background: #0a0a1a;
  }
  .aurora-layer {
    position: absolute;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.45;
    mix-blend-mode: screen;
    will-change: transform;
  }
  .aurora-layer.purple {
    background: radial-gradient(ellipse at 30% 50%, #8B5CF6 0%, #A78BFA 30%, transparent 70%);
    animation: aurora-purple 18s ease-in-out infinite alternate;
  }
  .aurora-layer.cyan {
    background: radial-gradient(ellipse at 70% 40%, #06B6D4 0%, #22D3EE 30%, transparent 70%);
    animation: aurora-cyan 22s ease-in-out infinite alternate;
  }
  .aurora-layer.pink {
    background: radial-gradient(ellipse at 50% 70%, #EC4899 0%, #F472B6 30%, transparent 70%);
    animation: aurora-pink 20s ease-in-out infinite alternate;
  }

  @keyframes aurora-purple {
    0%   { transform: translate(0%, 0%) rotate(0deg) scale(1); }
    33%  { transform: translate(10%, -5%) rotate(15deg) scale(1.1); }
    66%  { transform: translate(-5%, 10%) rotate(-10deg) scale(0.95); }
    100% { transform: translate(5%, 5%) rotate(20deg) scale(1.05); }
  }
  @keyframes aurora-cyan {
    0%   { transform: translate(0%, 0%) rotate(0deg) scale(1); }
    33%  { transform: translate(-8%, 8%) rotate(-20deg) scale(1.15); }
    66%  { transform: translate(12%, -3%) rotate(10deg) scale(0.9); }
    100% { transform: translate(-3%, -8%) rotate(-15deg) scale(1.1); }
  }
  @keyframes aurora-pink {
    0%   { transform: translate(0%, 0%) rotate(0deg) scale(1); }
    33%  { transform: translate(6%, 12%) rotate(25deg) scale(0.9); }
    66%  { transform: translate(-10%, -6%) rotate(-15deg) scale(1.1); }
    100% { transform: translate(8%, -4%) rotate(10deg) scale(1.05); }
  }

  /* Subtle star field */
  .aurora-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4) 50%, transparent 100%),
      radial-gradient(1px 1px at 30% 65%, rgba(255,255,255,0.3) 50%, transparent 100%),
      radial-gradient(1.5px 1.5px at 55% 15%, rgba(255,255,255,0.5) 50%, transparent 100%),
      radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.3) 50%, transparent 100%),
      radial-gradient(1px 1px at 85% 35%, rgba(255,255,255,0.4) 50%, transparent 100%),
      radial-gradient(1.5px 1.5px at 20% 90%, rgba(255,255,255,0.35) 50%, transparent 100%),
      radial-gradient(1px 1px at 45% 50%, rgba(255,255,255,0.25) 50%, transparent 100%),
      radial-gradient(1px 1px at 92% 60%, rgba(255,255,255,0.3) 50%, transparent 100%),
      radial-gradient(1.5px 1.5px at 5% 55%, rgba(255,255,255,0.4) 50%, transparent 100%),
      radial-gradient(1px 1px at 60% 42%, rgba(255,255,255,0.3) 50%, transparent 100%),
      radial-gradient(1px 1px at 78% 12%, rgba(255,255,255,0.35) 50%, transparent 100%),
      radial-gradient(1.2px 1.2px at 38% 85%, rgba(255,255,255,0.3) 50%, transparent 100%);
    animation: stars-twinkle 6s ease-in-out infinite alternate;
  }
  /* Vignette overlay */
  .aurora-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(5,5,15,0.6) 100%);
    pointer-events: none;
  }
  @keyframes stars-twinkle {
    0%   { opacity: 0.5; }
    100% { opacity: 1; }
  }

  /* ============ 5. COLORED FLOATING PARTICLES ============ */
  .particles {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    filter: blur(1px);
    opacity: 0.7;
    will-change: transform;
  }
  .particle:nth-child(1) {
    width: 8px; height: 8px;
    background: #8B5CF6;
    box-shadow: 0 0 20px 6px rgba(139,92,246,0.5);
    top: 15%; left: 10%;
    animation: float-1 14s ease-in-out infinite;
  }
  .particle:nth-child(2) {
    width: 6px; height: 6px;
    background: #22D3EE;
    box-shadow: 0 0 18px 5px rgba(34,211,238,0.5);
    top: 70%; left: 85%;
    animation: float-2 18s ease-in-out infinite;
  }
  .particle:nth-child(3) {
    width: 10px; height: 10px;
    background: #EC4899;
    box-shadow: 0 0 24px 8px rgba(236,72,153,0.4);
    top: 40%; left: 75%;
    animation: float-3 16s ease-in-out infinite;
  }
  .particle:nth-child(4) {
    width: 5px; height: 5px;
    background: #A78BFA;
    box-shadow: 0 0 16px 4px rgba(167,139,250,0.5);
    top: 80%; left: 20%;
    animation: float-4 20s ease-in-out infinite;
  }
  .particle:nth-child(5) {
    width: 7px; height: 7px;
    background: #F472B6;
    box-shadow: 0 0 22px 6px rgba(244,114,182,0.45);
    top: 25%; left: 55%;
    animation: float-5 15s ease-in-out infinite;
  }

  @keyframes float-1 {
    0%   { transform: translate(0, 0) scale(1); }
    25%  { transform: translate(60px, -40px) scale(1.3); }
    50%  { transform: translate(20px, 80px) scale(0.8); }
    75%  { transform: translate(-50px, 30px) scale(1.1); }
    100% { transform: translate(0, 0) scale(1); }
  }
  @keyframes float-2 {
    0%   { transform: translate(0, 0) scale(1); }
    25%  { transform: translate(-70px, 30px) scale(0.9); }
    50%  { transform: translate(-30px, -60px) scale(1.2); }
    75%  { transform: translate(40px, -20px) scale(1); }
    100% { transform: translate(0, 0) scale(1); }
  }
  @keyframes float-3 {
    0%   { transform: translate(0, 0) scale(1); }
    25%  { transform: translate(50px, 50px) scale(1.1); }
    50%  { transform: translate(-40px, 20px) scale(0.85); }
    75%  { transform: translate(30px, -60px) scale(1.2); }
    100% { transform: translate(0, 0) scale(1); }
  }
  @keyframes float-4 {
    0%   { transform: translate(0, 0) scale(1); }
    25%  { transform: translate(30px, -70px) scale(1.15); }
    50%  { transform: translate(80px, -30px) scale(0.9); }
    75%  { transform: translate(-20px, -50px) scale(1.05); }
    100% { transform: translate(0, 0) scale(1); }
  }
  @keyframes float-5 {
    0%   { transform: translate(0, 0) scale(1); }
    25%  { transform: translate(-60px, 40px) scale(0.85); }
    50%  { transform: translate(40px, -50px) scale(1.15); }
    75%  { transform: translate(-30px, -30px) scale(0.95); }
    100% { transform: translate(0, 0) scale(1); }
  }

  /* ============ MAIN CONTAINER ============ */
  .login-container {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 20px;
    padding-bottom: 40px;
    width: 100%;
    max-width: 440px;
    transition: transform 0.15s ease-out;
  }

  /* ============ 2. ROTATING GRADIENT BORDER (LOGO) ============ */
  .logo-wrapper {
    position: relative;
    width: 96px;
    height: 96px;
    opacity: 0;
    animation: spring-in 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.6) 0.2s forwards;
  }
  .logo-border {
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      #8B5CF6, #06B6D4, #EC4899, #A78BFA, #22D3EE, #F472B6, #8B5CF6
    );
    animation: spin-border 4s linear infinite;
  }
  @keyframes spin-border {
    to { transform: rotate(360deg); }
  }
  .logo-inner {
    position: absolute;
    inset: 3px;
    border-radius: 50%;
    background: #0f0f2e;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .logo-inner svg {
    width: 48px;
    height: 48px;
  }

  /* ============ 7a. SHINE SWEEP ON LOGO ============ */
  .logo-wrapper::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background: linear-gradient(
      105deg,
      transparent 40%,
      rgba(255,255,255,0.25) 45%,
      rgba(255,255,255,0.45) 50%,
      rgba(255,255,255,0.25) 55%,
      transparent 60%
    );
    animation: shine-sweep 4s ease-in-out 1.5s infinite;
    pointer-events: none;
    z-index: 5;
  }

  @keyframes shine-sweep {
    0%   { transform: translateX(-120%) rotate(25deg); }
    20%  { transform: translateX(120%) rotate(25deg); }
    100% { transform: translateX(120%) rotate(25deg); }
  }

  /* ============ BRAND TEXT AREA ============ */
  .brand-area {
    text-align: center;
    opacity: 0;
    animation: slide-in-up 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.35) 0.5s forwards;
  }

  /* ============ 3. HOLOGRAPHIC TEXT ============ */
  .brand-name {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(
      90deg,
      #8B5CF6, #A78BFA, #22D3EE, #06B6D4, #EC4899, #F472B6, #8B5CF6
    );
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: holo-flow 5s linear infinite;
    line-height: 1.3;
  }
  @keyframes holo-flow {
    0%   { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }

  .brand-subtitle {
    font-size: 0.95rem;
    color: rgba(167, 139, 250, 0.7);
    margin-top: 6px;
    letter-spacing: 0.15em;
    font-weight: 300;
  }

  /* ============ 4. GLASSMORPHISM CARD ============ */
  .glass-card {
    position: relative;
    width: 100%;
    background: rgba(15, 15, 46, 0.55);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid rgba(139, 92, 246, 0.15);
    border-radius: 20px;
    padding: 40px 36px 36px;
    overflow: hidden;
    opacity: 0;
    animation: fade-scale-in 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.2) 0.8s forwards;
  }
  /* Rainbow top line */
  .glass-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, #8B5CF6, #06B6D4, #EC4899, #A78BFA, #22D3EE, #F472B6);
    background-size: 200% 100%;
    animation: rainbow-line 4s linear infinite;
  }
  @keyframes rainbow-line {
    0%   { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }
  /* Inner glow */
  .glass-card::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 50% 0%, rgba(139,92,246,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  /* ============ FORM ELEMENTS ============ */
  .form-group {
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
  }
  .form-group label {
    display: block;
    font-size: 0.82rem;
    font-weight: 500;
    color: rgba(167, 139, 250, 0.8);
    margin-bottom: 8px;
    letter-spacing: 0.04em;
  }
  .input-wrapper {
    position: relative;
  }
  .input-wrapper .input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    color: rgba(139, 92, 246, 0.5);
    pointer-events: none;
    transition: color 0.3s;
  }
  .form-input {
    width: 100%;
    padding: 13px 16px 13px 44px;
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(139, 92, 246, 0.2);
    border-radius: 12px;
    color: #e2e8f0;
    font-size: 0.95rem;
    outline: none;
    transition: all 0.35s ease;
  }
  .form-input::placeholder {
    color: rgba(148, 163, 184, 0.4);
  }
  .form-input:focus {
    border-color: rgba(139, 92, 246, 0.6);
    background: rgba(255, 255, 255, 0.07);
    box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.12), 0 0 20px rgba(139, 92, 246, 0.08);
  }
  .form-input:focus ~ .input-icon,
  .input-wrapper:hover .input-icon {
    color: rgba(139, 92, 246, 0.9);
  }

  /* Password toggle */
  .password-toggle {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: rgba(148, 163, 184, 0.5);
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    transition: color 0.3s;
  }
  .password-toggle:hover { color: rgba(167, 139, 250, 0.9); }
  .password-toggle svg { width: 18px; height: 18px; }

  /* Remember me + Forgot */
  .form-options {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    position: relative;
    z-index: 1;
  }
  .remember-me {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    color: rgba(203, 213, 225, 0.7);
    user-select: none;
  }
  .remember-me input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border: 1.5px solid rgba(139, 92, 246, 0.35);
    border-radius: 5px;
    background: rgba(255,255,255,0.04);
    cursor: pointer;
    position: relative;
    transition: all 0.3s;
    flex-shrink: 0;
  }
  .remember-me input[type="checkbox"]:checked {
    background: linear-gradient(135deg, #8B5CF6, #06B6D4);
    border-color: transparent;
  }
  .remember-me input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 5px;
    top: 2px;
    width: 5px;
    height: 9px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
  .forgot-link {
    font-size: 0.85rem;
    color: rgba(167, 139, 250, 0.7);
    text-decoration: none;
    transition: color 0.3s;
  }
  .forgot-link:hover { color: #A78BFA; }

  /* ============ 8. LOGIN BUTTON ============ */
  .btn-login {
    position: relative;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #7C3AED, #6366F1, #3B82F6);
    background-size: 200% 200%;
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    cursor: pointer;
    overflow: hidden;
    transition: all 0.4s ease;
    box-shadow:
      0 4px 20px rgba(124, 58, 237, 0.35),
      0 0 40px rgba(99, 102, 241, 0.15);
    z-index: 1;
    opacity: 0;
    animation-name: spring-in, btn-gradient-shift;
    animation-duration: 0.7s, 4s;
    animation-timing-function: cubic-bezier(0.175, 0.885, 0.32, 1.6), ease;
    animation-delay: 1.1s, 1.8s;
    animation-iteration-count: 1, infinite;
    animation-fill-mode: forwards, none;
  }
  @keyframes btn-gradient-shift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow:
      0 6px 30px rgba(124, 58, 237, 0.5),
      0 0 60px rgba(99, 102, 241, 0.25),
      0 0 80px rgba(236, 72, 153, 0.12);
  }
  .btn-login:active {
    transform: translateY(0) scale(0.98);
  }

  /* ============ 7b. SHINE SWEEP ON BUTTON ============ */
  .btn-login::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(
      105deg,
      transparent 30%,
      rgba(255,255,255,0.15) 45%,
      rgba(255,255,255,0.35) 50%,
      rgba(255,255,255,0.15) 55%,
      transparent 70%
    );
    animation: btn-shine 4s ease-in-out 2s infinite;
  }
  @keyframes btn-shine {
    0%   { left: -100%; }
    25%  { left: 150%; }
    100% { left: 150%; }
  }

  /* Button loading state */
  .btn-login.loading {
    pointer-events: none;
    color: transparent;
  }
  .btn-login.loading::before {
    content: '';
    position: absolute;
    inset: 0;
    margin: auto;
    width: 24px;
    height: 24px;
    border: 3px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    z-index: 10;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ============ FOOTER LINKS ============ */
  .form-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 0.85rem;
    color: rgba(148, 163, 184, 0.5);
    position: relative;
    z-index: 1;
  }
  .form-footer a {
    color: rgba(167, 139, 250, 0.8);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.3s;
    position: relative;
  }
  .form-footer a::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 0;
    height: 1px;
    background: linear-gradient(90deg, #8B5CF6, #06B6D4);
    transition: width 0.3s;
  }
  .form-footer a:hover { color: #A78BFA; }
  .form-footer a:hover::after { width: 100%; }
  .form-footer .divider {
    margin: 0 12px;
    color: rgba(100, 116, 139, 0.4);
  }

  /* ============ 6. ENTRANCE ANIMATIONS ============ */
  @keyframes spring-in {
    0%   { opacity: 0; transform: scale(0.3) translateY(30px); }
    50%  { opacity: 1; transform: scale(1.08) translateY(-5px); }
    70%  { transform: scale(0.96) translateY(2px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes slide-in-up {
    0%   { opacity: 0; transform: translateY(30px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes fade-scale-in {
    0%   { opacity: 0; transform: scale(0.92) translateY(20px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 480px) {
    .login-container { padding: 16px; gap: 18px; }
    .glass-card { padding: 30px 24px 28px; border-radius: 16px; }
    .brand-name { font-size: 1.6rem; }
    .brand-subtitle { font-size: 0.85rem; }
    .logo-wrapper { width: 80px; height: 80px; }
    .logo-inner svg { width: 40px; height: 40px; }
  }
  @media (max-height: 700px) {
    .login-container { gap: 16px; }
    .glass-card { padding: 28px 28px 24px; }
  }

  /* ============ TOAST ============ */
  .toast {
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: rgba(15, 15, 46, 0.85);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(139, 92, 246, 0.3);
    padding: 12px 28px;
    border-radius: 12px;
    color: #e2e8f0;
    font-size: 0.9rem;
    z-index: 1000;
    transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.35);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

  <!-- 1. Aurora Background -->
  <div class="aurora-bg">
    <div class="aurora-layer purple"></div>
    <div class="aurora-layer cyan"></div>
    <div class="aurora-layer pink"></div>
  </div>

  <!-- 5. Floating Particles -->
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <!-- Main Container -->
  <div class="login-container">

    <!-- 2. Logo with Rotating Gradient Border -->
    <div class="logo-wrapper">
      <div class="logo-border"></div>
      <div class="logo-inner">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Rocket icon -->
          <defs>
            <linearGradient id="rocketGrad" x1="20" y1="8" x2="44" y2="56" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#A78BFA"/>
              <stop offset="50%" stop-color="#22D3EE"/>
              <stop offset="100%" stop-color="#F472B6"/>
            </linearGradient>
          </defs>
          <path d="M32 6C32 6 22 18 22 34C22 40 24 46 28 50L32 56L36 50C40 46 42 40 42 34C42 18 32 6 32 6Z"
                stroke="url(#rocketGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="rgba(139,92,246,0.1)"/>
          <circle cx="32" cy="30" r="5" stroke="url(#rocketGrad)" stroke-width="2" fill="rgba(34,211,238,0.15)"/>
          <path d="M22 34C18 36 16 42 16 42L22 40" stroke="url(#rocketGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M42 34C46 36 48 42 48 42L42 40" stroke="url(#rocketGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <!-- Flame -->
          <path d="M29 50C29 50 30 54 32 56C34 54 35 50 35 50" stroke="#F472B6" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
        </svg>
      </div>
    </div>

    <!-- 3. Brand Name (Holographic Text) -->
    <div class="brand-area">
      <h1 class="brand-name">ResumePilot AI</h1>
      <p class="brand-subtitle">AI智能求职助手</p>
    </div>

    <!-- 4. Glassmorphism Card -->
    <div class="glass-card">
      <form id="loginForm" autocomplete="off">
        <!-- Username -->
        <div class="form-group">
          <label for="username">用户名</label>
          <div class="input-wrapper">
            <input type="text" id="username" class="form-input" placeholder="请输入用户名" autocomplete="off">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">密码</label>
          <div class="input-wrapper">
            <input type="password" id="password" class="form-input" placeholder="请输入密码" autocomplete="off" style="padding-right: 44px;">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <button type="button" class="password-toggle" id="togglePassword" aria-label="显示密码">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="eyeIcon">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Options -->
        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe">
            <span>记住我</span>
          </label>
          <a href="#" class="forgot-link">忘记密码?</a>
        </div>

        <!-- 8. Login Button -->
        <button type="submit" class="btn-login" id="loginBtn">登 录</button>
      </form>

      <!-- Footer -->
      <div class="form-footer">
        <span>还没有账号?</span>
        <a href="#">注册账号</a>
        <span class="divider">|</span>
        <a href="#">忘记密码</a>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  // Password visibility toggle
  const toggleBtn = document.getElementById('togglePassword');
  const passwordInput = document.getElementById('password');
  const eyeIcon = document.getElementById('eyeIcon');
  let visible = false;

  toggleBtn.addEventListener('click', function() {
    visible = !visible;
    passwordInput.type = visible ? 'text' : 'password';
    if (visible) {
      eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>';
    } else {
      eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  });

  // Toast
  function showToast(msg, duration) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, duration || 2500);
  }

  // Form submit with loading
  const form = document.getElementById('loginForm');
  const btn = document.getElementById('loginBtn');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = passwordInput.value.trim();

    if (!username) { showToast('请输入用户名'); return; }
    if (!password) { showToast('请输入密码'); return; }

    btn.classList.add('loading');
    btn.disabled = true;

    // Simulate login
    setTimeout(function() {
      btn.classList.remove('loading');
      btn.disabled = false;
      showToast('登录成功，欢迎回来！', 3000);
    }, 2000);
  });

  // Interactive parallax on mouse move (subtle)
  const container = document.querySelector('.login-container');
  document.addEventListener('mousemove', function(e) {
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    const dx = (e.clientX - cx) / cx;
    const dy = (e.clientY - cy) / cy;
    container.style.transform = 'translate(' + (dx * 4) + 'px, ' + (dy * 4) + 'px)';
  });

  // Input focus ripple effect
  document.querySelectorAll('.form-input').forEach(function(input) {
    input.addEventListener('focus', function() {
      this.parentElement.style.transform = 'scale(1.01)';
      this.parentElement.style.transition = 'transform 0.3s ease';
    });
    input.addEventListener('blur', function() {
      this.parentElement.style.transform = 'scale(1)';
    });
  });
})();
</script>
</body>
</html>
